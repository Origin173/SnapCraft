name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: |
          go test ./...
          go test -coverprofile=coverage.out -covermode=atomic \
            ./internal/archive/... \
            ./internal/backup/... \
            ./internal/config/... \
            ./internal/rclone/... \
            ./internal/repository/... \
            ./internal/restore/... \
            ./internal/retention/... \
            ./internal/snapshot/...
      - name: Build
        run: go build -o snapcraft ./cmd/snapcraft
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: coverage.out

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o snapcraft-linux-amd64 ./cmd/snapcraft
          GOOS=windows GOARCH=amd64 go build -o snapcraft-windows-amd64.exe ./cmd/snapcraft
          GOOS=darwin GOARCH=amd64 go build -o snapcraft-darwin-amd64 ./cmd/snapcraft
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            snapcraft-linux-amd64
            snapcraft-windows-amd64.exe
            snapcraft-darwin-amd64
